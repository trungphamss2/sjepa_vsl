# S-JEPA Finetune — NTU-120 | X-Set Protocol
task: "NTU-120 Action Classification - Cross Setup"
device: "cuda"

data:
  paths:
    - "./DATA/nturgb+d_skeletons"       # NTU-60
    - "./DATA/nturgb+d120_skeletons"    # NTU-120 (phần mở rộng)
  max_frames: 120
  protocol: "xset"

model:
  num_classes: 120                                   # NTU-120 có 120 hành động
  embed_dim: 256
  segment_length: 4
  pretrained_path: "checkpoints/pretrain_ntu120_xset/sjepa_pro_ep300.pth"
  dropout: 0.0
  min_pretrained_match_ratio: 0.9

training:
  epochs: 100
  batch_size: 64
  grad_accum_steps: 4    # Effective batch size = 256
  lr: 3.0e-4
  final_lr: 1.0e-5
  layer_decay: 0.75
  weight_decay: 0.05
  save_every: 10
  warmup_epochs: 5            # Đúng bài báo S-JEPA: 5 warmup epochs
  early_stopping_patience: 0   # 0 = tắt early stop, chạy đủ 100 epochs như paper
  num_workers: 8
  pin_memory: true

wandb:
  project: "ntu-classifier"
  name: "finetune_NTU120_XSet"
